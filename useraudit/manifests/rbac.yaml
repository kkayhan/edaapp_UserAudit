apiVersion: v1
kind: ServiceAccount
metadata:
  name: eda-useraudit
  namespace: eda-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: eda-useraudit
rules:
  - apiGroups: ["*"]
    resources: ["*"]
    verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eda-useraudit
subjects:
  - kind: ServiceAccount
    name: eda-useraudit
    namespace: eda-system
roleRef:
  kind: ClusterRole
  name: eda-useraudit
  apiGroup: rbac.authorization.k8s.io
